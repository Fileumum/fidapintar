<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FidaPintar - Belajar Seru!</title>

  <meta name="description" content="FidaPintar adalah game edukasi membaca dan matematika untuk anak SD. Belajar jadi lebih menyenangkan dan interaktif.">

  <!-- Open Graph -->
  <meta property="og:title" content="FidaPintar - Belajar Seru!">
  <meta property="og:description" content="Game edukasi membaca dan matematika interaktif untuk anak SD. Belajar jadi lebih menyenangkan!">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/4149/4149675.png">

  <!-- Favicon -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4149/4149675.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #5f2c82, #49a09d);
      overflow: hidden;
      color: white;
    }

    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      text-align: center;
    }

    /* ICON */
    .icon {
      width: 120px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 25px;
    }

    /* PROGRESS CIRCLE */
    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.2);
      position: relative;
    }

    .fill {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid transparent;
      border-top: 6px solid #ffffff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .percent {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    /* BINTANG BACKGROUND */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .stars span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }

    #app {
      display: none;
      width: 100%;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

  <div class="stars" id="stars"></div>

  <div id="loading">

    <img src="https://cdn-icons-png.flaticon.com/512/4149/4149675.png" class="icon">

    <h1>Loading FidaPintar...</h1>

    <div class="circle">
      <div class="fill"></div>
      <div class="percent" id="percent">0%</div>
    </div>

  </div>

  <div id="app">
    <iframe src="https://script.google.com/macros/s/AKfycbyA8DgpMp2EoBQYPg-Em9qMX1Ug33yeLw_2PH7iLbFkSrrHcvQkQTl3USCoNHfUNHw/exec"></iframe>
  </div>

  <script>
    // Generate bintang
    const starsContainer = document.getElementById("stars");
    for (let i = 0; i < 40; i++) {
      let star = document.createElement("span");
      star.style.top = Math.random() * 100 + "%";
      star.style.left = Math.random() * 100 + "%";
      star.style.animationDuration = (1 + Math.random() * 2) + "s";
      starsContainer.appendChild(star);
    }

    let progress = 0;
    const percent = document.getElementById("percent");

    const interval = setInterval(() => {
      progress += Math.random() * 6;

      if (progress >= 100) progress = 100;

      percent.innerText = Math.floor(progress) + "%";

      if (progress === 100) {
        clearInterval(interval);

        setTimeout(() => {
          document.getElementById("loading").style.display = "none";
          const app = document.getElementById("app");
          app.style.display = "block";

          setTimeout(() => {
            app.style.opacity = 1;
            document.body.style.overflow = "auto";
          }, 50);

        }, 500);
      }

    }, 120);
  </script>

</body>
</html>
